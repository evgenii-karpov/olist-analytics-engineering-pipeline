services:
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: olist-airflow:local
    container_name: olist-airflow
    restart: unless-stopped
    command:
      - bash
      - /opt/airflow/project/docker/airflow/load-env-and-run.sh
      - airflow
      - standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/project/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: local_dev_only_secret_key
      OLIST_PROJECT_ROOT: /opt/airflow/project
      OLIST_PYTHON_BIN: python
      DBT_PROFILES_DIR: /opt/airflow/project/dbt/olist_analytics
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
