repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]

      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        files: ^dbt/olist_analytics/(analyses|macros|models|snapshots|tests)/.*\.sql$
        additional_dependencies:
          - dbt-postgres>=1.8,<2
          - dbt-redshift>=1.8,<2
          - sqlfluff-templater-dbt==4.1.0
