repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]

      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: dbt-parse
        name: dbt-parse
        entry: uv run dbt parse --project-dir dbt/olist_analytics --profiles-dir dbt/olist_analytics --target local_pg --no-partial-parse --show-all-deprecations
        language: system
        pass_filenames: false
        files: ^dbt/olist_analytics/(dbt_project\.yml|profiles\.yml|models/|macros/|snapshots/|tests/|analyses/)
