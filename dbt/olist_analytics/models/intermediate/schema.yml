version: 2

models:
  - name: int_customer_current_attributes
    description: Customer attributes visible as of the current dbt batch date.
    columns:
      - name: customer_unique_id
        data_tests:
          - not_null
          - unique
  - name: int_product_current_attributes
    description: Product attributes visible as of the current dbt batch date.
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
  - name: int_order_payment_allocations
    description: Allocates order-level payment value to order item grain.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: order_item_id
        data_tests:
          - not_null
      - name: item_gross_amount
        data_tests:
          - non_negative
      - name: order_gross_amount
        data_tests:
          - non_negative
      - name: allocated_payment_value
        data_tests:
          - non_negative
