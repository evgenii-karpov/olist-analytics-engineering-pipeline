version: 2

models:
  - name: dim_customer_scd2
    description: SCD2 customer dimension produced from dbt snapshot records.
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
  - name: dim_product_scd2
    description: SCD2 product dimension produced from dbt snapshot records.
    columns:
      - name: product_key
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
