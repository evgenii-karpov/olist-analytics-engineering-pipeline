version: 2

models:
  - name: mart_daily_revenue
    description: Daily revenue mart at order purchase date grain.
    columns:
      - name: order_purchase_date
        data_tests:
          - not_null
          - unique
      - name: gross_revenue
        data_tests:
          - not_null
          - non_negative
      - name: allocated_payment_revenue
        data_tests:
          - not_null
          - non_negative
      - name: product_revenue
        data_tests:
          - not_null
          - non_negative
      - name: freight_revenue
        data_tests:
          - not_null
          - non_negative
      - name: orders_count
        data_tests:
          - not_null
          - non_negative
      - name: customers_count
        data_tests:
          - not_null
          - non_negative
      - name: items_count
        data_tests:
          - not_null
          - non_negative
      - name: average_order_value
        data_tests:
          - non_negative
      - name: average_paid_order_value
        data_tests:
          - non_negative
      - name: late_deliveries_count
        data_tests:
          - not_null
          - non_negative
  - name: mart_monthly_arpu
    description: Monthly ARPU mart at order purchase month grain.
    columns:
      - name: order_month
        data_tests:
          - not_null
          - unique
      - name: active_customers
        data_tests:
          - not_null
          - non_negative
      - name: total_revenue
        data_tests:
          - not_null
          - non_negative
      - name: arpu
        data_tests:
          - non_negative
      - name: orders_count
        data_tests:
          - not_null
          - non_negative
      - name: orders_per_customer
        data_tests:
          - non_negative
      - name: average_order_value
        data_tests:
          - non_negative
      - name: repeat_customer_rate
        data_tests:
          - non_negative
