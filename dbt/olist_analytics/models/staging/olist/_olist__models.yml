version: 2

models:
  - name: stg_olist__customers
    description: Clean customer records with source metadata.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - not_null
      - name: customer_zip_code_prefix
        data_tests:
          - not_null
      - name: customer_state
        data_tests:
          - not_null
  - name: stg_olist__geolocation
    description: Clean geolocation records.
    columns:
      - name: geolocation_zip_code_prefix
        data_tests:
          - not_null
      - name: geolocation_lat
        data_tests:
          - not_null
      - name: geolocation_lng
        data_tests:
          - not_null
  - name: stg_olist__order_items
    description: Clean order item records.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id
      - name: order_item_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__products')
                field: product_id
      - name: seller_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__sellers')
                field: seller_id
      - name: price
        data_tests:
          - not_null
          - non_negative
      - name: freight_value
        data_tests:
          - not_null
          - non_negative
  - name: stg_olist__order_payments
    description: Clean order payment records.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - payment_sequential
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id
      - name: payment_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - boleto
                  - credit_card
                  - debit_card
                  - voucher
                  - not_defined
      - name: payment_installments
        data_tests:
          - not_null
          - non_negative
      - name: payment_value
        data_tests:
          - not_null
          - non_negative
  - name: stg_olist__order_reviews
    description: Clean order review records.
    columns:
      - name: review_id
        data_tests:
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id
      - name: review_score
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
  - name: stg_olist__orders
    description: Clean order records.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__customers')
                field: customer_id
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - approved
                  - canceled
                  - created
                  - delivered
                  - invoiced
                  - processing
                  - shipped
                  - unavailable
      - name: order_purchase_timestamp
        data_tests:
          - not_null
  - name: stg_olist__products
    description: Clean product catalog records.
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
  - name: stg_olist__sellers
    description: Clean seller records.
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        data_tests:
          - not_null
  - name: stg_olist__product_category_translation
    description: Portuguese to English product category mapping.
    columns:
      - name: product_category_name
        data_tests:
          - not_null
          - unique
      - name: product_category_name_english
        data_tests:
          - not_null
  - name: stg_olist__customer_profile_changes
    description: Generated customer profile correction feed for SCD2 simulation.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_unique_id
              - effective_at
    columns:
      - name: customer_unique_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__customers')
                field: customer_unique_id
      - name: effective_at
        data_tests:
          - not_null
      - name: customer_state
        data_tests:
          - not_null
  - name: stg_olist__product_attribute_changes
    description: >
      Generated product attribute correction feed for SCD2 simulation.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_id
              - effective_at
    columns:
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__products')
                field: product_id
      - name: effective_at
        data_tests:
          - not_null
      - name: product_category_name
        data_tests:
          - not_null
