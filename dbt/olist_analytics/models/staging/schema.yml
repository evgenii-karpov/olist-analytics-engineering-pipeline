version: 2

models:
  - name: stg_customers
    description: Clean customer records with source metadata.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_zip_code_prefix
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null
  - name: stg_geolocation
    description: Clean geolocation records.
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null
      - name: geolocation_lat
        tests:
          - not_null
      - name: geolocation_lng
        tests:
          - not_null
  - name: stg_order_items
    description: Clean order item records.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_sellers')
                field: seller_id
      - name: price
        tests:
          - not_null
          - non_negative
      - name: freight_value
        tests:
          - not_null
          - non_negative
  - name: stg_order_payments
    description: Clean order payment records.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - payment_sequential
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['boleto', 'credit_card', 'debit_card', 'voucher', 'not_defined']
      - name: payment_installments
        tests:
          - not_null
          - non_negative
      - name: payment_value
        tests:
          - not_null
          - non_negative
  - name: stg_order_reviews
    description: Clean order review records.
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
  - name: stg_orders
    description: Clean order records.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['approved', 'canceled', 'created', 'delivered', 'invoiced', 'processing', 'shipped', 'unavailable']
      - name: order_purchase_timestamp
        tests:
          - not_null
  - name: stg_products
    description: Clean product catalog records.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
  - name: stg_sellers
    description: Clean seller records.
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        tests:
          - not_null
  - name: stg_product_category_translation
    description: Portuguese to English product category mapping.
    columns:
      - name: product_category_name
        tests:
          - not_null
          - unique
      - name: product_category_name_english
        tests:
          - not_null
  - name: stg_customer_profile_changes
    description: Generated customer profile correction feed for SCD2 simulation.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_unique_id
              - effective_at
    columns:
      - name: customer_unique_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_unique_id
      - name: effective_at
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null
  - name: stg_product_attribute_changes
    description: Generated product attribute correction feed for SCD2 simulation.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_id
              - effective_at
    columns:
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: effective_at
        tests:
          - not_null
      - name: product_category_name
        tests:
          - not_null
