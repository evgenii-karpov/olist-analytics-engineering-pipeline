name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python-unit:
    name: Python unit and fixture contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall airflow/dags scripts tests

      - name: Validate small fixture contract
        run: >-
          python scripts/utilities/validate_source_contract.py
          --archive tests/fixtures/olist_small/olist_small.zip
          --profile tests/fixtures/olist_small/source_profile_small.json

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

  dbt-static:
    name: dbt parse
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Parse dbt project
        run: dbt parse --no-partial-parse --show-all-deprecations
        working-directory: dbt/olist_analytics

  airflow-imports:
    name: Docker Compose and Airflow DAG imports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build Airflow image
        run: docker compose build airflow

      - name: Check Airflow DAG import errors
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/opt/airflow/project" \
            -e OLIST_PROJECT_ROOT=/opt/airflow/project \
            -e AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/project/airflow/dags \
            -e AIRFLOW_HOME=/tmp/airflow \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow/airflow.db \
            -e AIRFLOW__LOGGING__BASE_LOG_FOLDER=/tmp/airflow/logs \
            -w /opt/airflow/project \
            olist-airflow:local \
            python scripts/ci/check_airflow_dag_imports.py

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v

  fixture-integration:
    name: Small fixture integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: olist_analytics
          POSTGRES_USER: olist
          POSTGRES_PASSWORD: olist
          PGDATA: /var/lib/postgresql/18/docker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olist -d olist_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Run small fixture pipeline
        run: python scripts/ci/run_fixture_pipeline.py --reset-warehouse
