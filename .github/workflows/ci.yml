name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python-unit:
    name: Python unit and fixture contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall airflow/dags scripts tests

      - name: Validate small fixture contract
        run: >-
          python scripts/utilities/validate_source_contract.py
          --archive tests/fixtures/olist_small/olist_small.zip
          --profile tests/fixtures/olist_small/source_profile_small.json

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

  dbt-static:
    name: dbt parse
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Parse dbt project
        run: dbt parse --no-partial-parse --show-all-deprecations
        working-directory: dbt/olist_analytics

  airflow-imports:
    name: Docker Compose and Airflow DAG imports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config

      - name: Start Airflow stack
        run: docker compose up -d postgres airflow

      - name: Check Airflow DAG import errors
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T airflow airflow dags list-import-errors --output json > airflow_import_errors.json; then
              cat airflow_import_errors.json
              if python -c 'import json, sys; errors = json.load(open("airflow_import_errors.json")); sys.exit(0 if not errors else 1)'; then
                exit 0
              fi
              echo "Airflow DAG import errors detected"
              exit 1
            fi
            echo "Airflow is not ready yet (attempt ${attempt}/30)"
            sleep 10
          done
          exit 1

      - name: Stop Airflow stack
        if: always()
        run: docker compose down -v
